name: Exercise Tests

on:
  pull_request:
    paths:
      - 'exercises/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        snapshot: [base, 10k, 100k]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: exercises/tests
        run: pip install -r requirements.txt

      - name: Run tests (${{ matrix.snapshot }})
        working-directory: exercises/tests
        run: |
          pytest \
            --snapshot ${{ matrix.snapshot }} \
            --json-report \
            --json-report-file=test_results/report_${{ matrix.snapshot }}.json \
            --no-header \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.snapshot }}
          path: exercises/tests/test_results/
